; gene-sim Godot export presets (Godot 4.6, ADR-010). Used by .github/workflows/release.yml:
;   godot --headless --path godot --export-release "Linux" <out>
; The LiveSim cdylib (crates/godot-sim) is staged into godot/ as res://libgodot_sim.so + a matching
; gene_sim.gdextension by the CI export step, so the GDExtension is bundled beside the executable.
; (Renderer stays read-only — biology is in the Rust core, inv #2.) Regenerate/refine via the editor's
; Project → Export… if a field needs tuning for a platform.

[preset.0]

name="Linux"
platform="Linux"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../build/gene-sim.x86_64"
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
binary_format/architecture="x86_64"
ssh_remote_deploy/enabled=false

[preset.1]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../build/gene-sim.exe"
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.1.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
binary_format/architecture="x86_64"
ssh_remote_deploy/enabled=false
application/modify_resources=false
application/icon_interpolation=4
